<!-- search.html COMPLETO PROFISSIONAL NOVASCRIPTS -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaScripts Search</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#09090d;
color:white;
min-height:100vh;
}

/* fundo */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#6a11ff22,transparent 30%),
radial-gradient(circle at bottom right,#8f45ff22,transparent 35%);
z-index:-1;
}

/* topo */

header{
padding:22px 35px;
display:flex;
align-items:center;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;
border-bottom:1px solid #1c1c24;
background:#0e0e14dd;
backdrop-filter:blur(14px);
position:sticky;
top:0;
z-index:50;
}

.logo{
font-size:30px;
font-weight:800;
color:white;
text-decoration:none;
}

.logo span{
color:#8f45ff;
}

.search-box{
flex:1;
max-width:750px;
display:flex;
gap:12px;
}

.search-box input{
flex:1;
padding:17px 22px;
border:none;
outline:none;
border-radius:50px;
background:#15151c;
color:white;
font-size:16px;
}

.search-box button{
padding:0 26px;
border:none;
border-radius:50px;
background:#8f45ff;
color:white;
font-weight:800;
cursor:pointer;
}

.top-actions{
display:flex;
gap:12px;
}

.top-btn{
background:#181821;
padding:14px 18px;
border-radius:14px;
color:white;
text-decoration:none;
font-size:14px;
}

/* body */

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

/* status */

.search-status{
display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
color:#9e9eab;
font-size:14px;
}

.stats{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.stat{
background:#111118;
padding:10px 14px;
border-radius:12px;
}

/* grid */

.main-layout{
display:grid;
grid-template-columns:280px 1fr;
gap:22px;
}

/* sidebar */

.sidebar{
background:#111118;
border:1px solid #1d1d29;
padding:22px;
border-radius:22px;
height:fit-content;
position:sticky;
top:105px;
}

.sidebar h3{
font-size:17px;
margin-bottom:18px;
}

.filter-list{
display:flex;
flex-direction:column;
gap:10px;
}

.filter-btn{
background:#171720;
border:none;
color:white;
padding:14px;
border-radius:14px;
cursor:pointer;
text-align:left;
font-weight:600;
}

.filter-btn.active,
.filter-btn:hover{
background:#8f45ff;
}

/* results */

.results{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:18px;
}

.card{
background:#111118;
border:1px solid #1d1d29;
border-radius:20px;
padding:22px;
transition:.2s;
}

.card:hover{
transform:translateY(-5px);
border-color:#8f45ff;
}

.badge{
display:inline-block;
padding:6px 12px;
background:#1d1d29;
border-radius:50px;
font-size:12px;
margin-bottom:14px;
color:#8f45ff;
font-weight:700;
}

.card h2{
font-size:22px;
margin-bottom:10px;
}

.meta{
font-size:14px;
color:#9d9db0;
margin-bottom:14px;
}

.desc{
font-size:15px;
color:#cfcfda;
line-height:1.6;
margin-bottom:18px;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{
border:none;
padding:13px 15px;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

.copy{
background:#8f45ff;
color:white;
}

.view{
background:#1c1c27;
color:white;
}

.like{
background:#15151d;
color:#ff7aa5;
}

/* vazio */

.empty{
display:none;
text-align:center;
padding:70px 20px;
background:#111118;
border-radius:22px;
color:#888;
}

/* modal */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.78);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-box{
width:100%;
max-width:850px;
max-height:92vh;
overflow:auto;
background:#111118;
border-radius:24px;
padding:25px;
border:1px solid #232332;
}

.modal-top{
display:flex;
justify-content:space-between;
gap:20px;
align-items:center;
margin-bottom:20px;
}

.close{
width:42px;
height:42px;
border:none;
border-radius:50%;
background:#1d1d27;
color:white;
font-size:20px;
cursor:pointer;
}

.modal-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
margin-bottom:18px;
}

.info{
background:#181820;
padding:15px;
border-radius:14px;
font-size:14px;
color:#ddd;
}

.modal-desc{
background:#181820;
padding:18px;
border-radius:16px;
line-height:1.6;
margin-bottom:18px;
color:#ddd;
}

.code-title{
font-size:14px;
margin-bottom:10px;
color:#8f45ff;
font-weight:700;
}

.code{
background:#09090d;
padding:18px;
border-radius:16px;
font-size:14px;
color:#7cff7c;
overflow:auto;
margin-bottom:18px;
white-space:pre-wrap;
word-break:break-word;
}

.modal-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.modal-actions button{
border:none;
padding:14px 18px;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

.primary{
background:#8f45ff;
color:white;
}

.secondary{
background:#1d1d27;
color:white;
}

/* toast */

#toast{
position:fixed;
left:50%;
bottom:25px;
transform:translateX(-50%);
background:#111118;
padding:15px 22px;
border-radius:14px;
display:none;
z-index:2000;
}

/* mobile */

@media(max-width:980px){

.main-layout{
grid-template-columns:1fr;
}

.sidebar{
position:relative;
top:0;
}

}

@media(max-width:700px){

header{
padding:18px;
}

.container{
padding:18px;
}

.search-box{
width:100%;
order:3;
}

.search-box button{
padding:0 18px;
}

.logo{
font-size:24px;
}

}

</style>
</head>
<body>

<div class="bg"></div>

<header>

<a href="index.html" class="logo">
Nova<span>Scripts</span>
</a>

<div class="search-box">
<input id="searchInput" type="text" placeholder="Pesquisar jogo, script ou categoria...">
<button onclick="searchNow()">Buscar</button>
</div>

<div class="top-actions">
<a href="index.html" class="top-btn">🏠 Home</a>
<a href="#" class="top-btn">🔥 Populares</a>
</div>

</header>

<div class="container">

<div class="search-status">

<div id="statusText">
Buscando...
</div>

<div class="stats">
<div class="stat">📦 <span id="totalScripts">0</span></div>
<div class="stat">👁️ <span id="viewsCount">0</span></div>
<div class="stat">❤️ <span id="favCount">0</span></div>
</div>

</div>

<div class="main-layout">

<!-- sidebar -->
<div class="sidebar">

<h3>Categorias</h3>

<div class="filter-list">

<button class="filter-btn active" onclick="filterCategory('all',this)">Todos</button>
<button class="filter-btn" onclick="filterCategory('Farm',this)">Farm</button>
<button class="filter-btn" onclick="filterCategory('PvP',this)">PvP</button>
<button class="filter-btn" onclick="filterCategory('ESP',this)">ESP</button>
<button class="filter-btn" onclick="filterCategory('Hub',this)">Hub</button>
<button class="filter-btn" onclick="filterCategory('Admin',this)">Admin</button>

</div>

</div>

<!-- resultados -->
<div>

<div class="results" id="results"></div>

<div class="empty" id="empty">
Nenhum script encontrado.
</div>

</div>

</div>

</div>

<!-- modal -->
<div class="modal" id="modal">

<div class="modal-box">

<div class="modal-top">
<h2 id="mTitle">Script</h2>
<button class="close" onclick="closeModal()">×</button>
</div>

<div class="modal-grid">

<div class="info">🎮 <strong>Jogo:</strong><br><span id="mGame">-</span></div>
<div class="info">📁 <strong>Categoria:</strong><br><span id="mCat">-</span></div>
<div class="info">👁️ <strong>Views:</strong><br><span id="mViews">0</span></div>
<div class="info">⭐ <strong>Status:</strong><br>Online</div>

</div>

<div class="modal-desc" id="mDesc">
Descrição do script.
</div>

<div class="code-title">LOADSTRING</div>

<div class="code" id="mCode"></div>

<div class="modal-actions">
<button class="primary" onclick="copyModal()">📋 Copiar Script</button>
<button class="secondary" onclick="closeModal()">Fechar</button>
</div>

</div>
</div>

<div id="toast"></div>

<script src="data.js"></script>

<script>

let currentCode = "";
let allResults = [];
let currentCategory = "all";

/* pegar pesquisa */
const params = new URLSearchParams(window.location.search);
const q = params.get("q") || "";

document.getElementById("searchInput").value = q;

/* enter */
document.getElementById("searchInput").addEventListener("keydown",e=>{
if(e.key==="Enter") searchNow();
});

/* buscar */
function searchNow(){

let val = document.getElementById("searchInput").value.trim();

if(val){
window.location.href =
"search.html?q=" + encodeURIComponent(val);
}

}

/* rodar pesquisa */
function runSearch(term){

if(typeof scripts === "undefined"){
document.getElementById("statusText").innerText =
"Erro: data.js não carregou.";
return;
}

allResults = scripts.filter(item =>
item.nome.toLowerCase().includes(term.toLowerCase()) ||
item.jogo.toLowerCase().includes(term.toLowerCase()) ||
item.categoria.toLowerCase().includes(term.toLowerCase())
);

document.getElementById("totalScripts").innerText = scripts.length;

renderResults();

}

/* render */
function renderResults(){

let box = document.getElementById("results");
let empty = document.getElementById("empty");

box.innerHTML = "";

let filtered = allResults.filter(item => {

if(currentCategory === "all") return true;

return item.categoria.toLowerCase() === currentCategory.toLowerCase();

});

document.getElementById("statusText").innerText =
filtered.length + " resultados encontrados";

let totalViews = 0;

filtered.forEach(item => {

totalViews += Number(item.views || 0);

box.innerHTML += `

<div class="card">

<div class="badge">${item.categoria}</div>

<h2>${item.nome}</h2>

<div class="meta">
${item.jogo}
</div>

<div class="desc">
${item.descricao || "Script premium atualizado e pronto para copiar."}
</div>

<div class="actions">

<button class="copy"
onclick="copyScript(\`${item.codigo}\`)">
📋 Copiar
</button>

<button class="view"
onclick='openModal(${JSON.stringify(item)})'>
👁️ Ver
</button>

<button class="like">
❤️
</button>

</div>

</div>

`;

});

document.getElementById("viewsCount").innerText = totalViews;

if(filtered.length <= 0){
empty.style.display = "block";
}else{
empty.style.display = "none";
}

}

/* filtro */
function filterCategory(cat,btn){

currentCategory = cat;

document.querySelectorAll(".filter-btn")
.forEach(el=>el.classList.remove("active"));

btn.classList.add("active");

renderResults();

}

/* modal */
function openModal(item){

currentCode = item.codigo;

document.getElementById("mTitle").innerText = item.nome;
document.getElementById("mGame").innerText = item.jogo;
document.getElementById("mCat").innerText = item.categoria;
document.getElementById("mViews").innerText = item.views || 0;
document.getElementById("mDesc").innerText =
item.descricao || "Sem descrição.";

document.getElementById("mCode").innerText =
item.codigo;

document.getElementById("modal").style.display = "flex";

}

/* fechar */
function closeModal(){
document.getElementById("modal").style.display = "none";
}

/* copiar */
function copyScript(code){
navigator.clipboard.writeText(code);
toast("Script copiado!");
}

function copyModal(){
navigator.clipboard.writeText(currentCode);
toast("Script copiado!");
}

/* toast */
function toast(msg){

let t = document.getElementById("toast");

t.innerText = msg;
t.style.display = "block";

setTimeout(()=>{
t.style.display = "none";
},2000);

}

/* clique fora fecha */
document.getElementById("modal").onclick = function(e){
if(e.target.id==="modal"){
closeModal();
}
}

/* iniciar */
runSearch(q);

</script>
</body>
</html>
