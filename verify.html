<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScripts | Verificação Segura</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #050508; --card: #0f0f1c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            font-family: 'Inter', sans-serif; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden;
        }

        /* EFEITO DE FUNDO */
        .glow {
            position: absolute; width: 300px; height: 300px;
            background: var(--primary); filter: blur(150px);
            opacity: 0.1; z-index: -1;
        }

        .verify-card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 30px; 
            width: 90%; 
            max-width: 420px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        h2 { font-weight: 900; font-size: 24px; margin-bottom: 10px; letter-spacing: -1px; }
        .steps-info { color: #666; font-size: 14px; margin-bottom: 30px; font-weight: 600; }

        .task { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 20px; 
            border-radius: 18px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 15px; 
            cursor: pointer; 
            text-decoration: none; 
            color: #fff; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .task:hover { 
            background: rgba(0, 255, 136, 0.05); 
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .task.done { 
            border-color: var(--primary); 
            background: rgba(0, 255, 136, 0.08); 
            pointer-events: none; 
        }
        
        .check { 
            width: 26px; height: 26px; border-radius: 8px; 
            border: 2px solid #222; background: #000;
            transition: 0.3s;
        }

        .done .check { 
            background: var(--primary); 
            border-color: var(--primary); 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }
        .done .check::after { content: '✓'; color: #000; font-weight: 900; font-size: 14px; }

        #unlockBtn { 
            width: 100%; padding: 20px; border-radius: 15px; border: none; 
            font-weight: 900; background: #161625; color: #444; 
            cursor: not-allowed; transition: 0.4s; margin-top: 20px;
            letter-spacing: 1px;
        }

        #unlockBtn.ready { 
            background: var(--primary); 
            color: #000; 
            cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }
    </style>
</head>
<body>

<div class="glow"></div>

<div class="verify-card">
    <div style="color: var(--primary); font-size: 40px; margin-bottom: 10px;">🛡️</div>
    <h2 id="verifyTitle">VERIFICAÇÃO (0/2)</h2>
    <p class="steps-info">Complete as ações para provar que é humano.</p>

    <a href="https://youtube.com/@blackzwmc?sub_confirmation=1" target="_blank" class="task" onclick="completeTask(1)">
        <div style="text-align: left;">
            <span style="display: block; font-size: 14px; font-weight: 800;">INSCREVER-SE</span>
            <span style="font-size: 11px; color: #555;">Canal Oficial NovaScripts</span>
        </div>
        <div class="check"></div>
    </a>

    <a href="https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128" target="_blank" class="task" onclick="completeTask(2)">
        <div style="text-align: left;">
            <span style="display: block; font-size: 14px; font-weight: 800;">VER ANÚNCIO</span>
            <span style="font-size: 11px; color: #555;">Aguarde 10 segundos no site</span>
        </div>
        <div class="check"></div>
    </a>

    <button id="unlockBtn" disabled>AGUARDANDO ETAPAS...</button>
</div>

<script>
    let tasksCompleted = new Set();

    function completeTask(id) {
        // Delay pequeno para simular checagem
        setTimeout(() => {
            tasksCompleted.add(id);
            const taskElements = document.querySelectorAll('.task');
            taskElements[id-1].classList.add('done');
            
            document.getElementById('verifyTitle').innerText = `VERIFICAÇÃO (${tasksCompleted.size}/2)`;

            if(tasksCompleted.size === 2) {
                const btn = document.getElementById('unlockBtn');
                btn.disabled = false;
                btn.classList.add('ready');
                btn.innerText = "LIBERAR SCRIPT AGORA";
            }
        }, 1000);
    }

    document.getElementById('unlockBtn').onclick = function() {
        // Abre o último popunder de lucro
        window.open('https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128', '_blank');
        
        // REDIRECIONA PARA A INDEX COM O STATUS DE SUCESSO
        // Isso faz a janela flutuante pular automaticamente na Home
        window.location.href = 'index.html?status=success';
    };
</script>

</body>
</html>
