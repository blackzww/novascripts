<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScripts | Verificação</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #08080b; font-family: 'Inter', sans-serif; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .verify-card { background: #11111a; padding: 40px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #1a1a2e; }
        h2 { font-weight: 900; margin-bottom: 25px; letter-spacing: -1px; }

        .task { background: rgba(255,255,255,0.03); border: 1px solid #1a1a2e; padding: 18px; border-radius: 15px; display: flex; justify-content: space-between; margin-bottom: 12px; cursor: pointer; text-decoration: none; color: #fff; transition: 0.3s; }
        .task:hover { border-color: #00ff88; background: rgba(0,255,136,0.05); }
        .task.done { border-color: #00ff88; background: rgba(0,255,136,0.05); pointer-events: none; opacity: 0.7; }
        
        .check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #222; }
        .done .check { background: #00ff88; border-color: #00ff88; display: flex; align-items: center; justify-content: center; }
        .done .check::after { content: '✓'; color: #000; font-weight: 900; font-size: 12px; }

        #unlockBtn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 900; background: #1a1a2e; color: #444; cursor: not-allowed; transition: 0.4s; margin-top: 15px; }
        #unlockBtn.ready { background: #00ff88; color: #000; cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }

        /* JANELA FLUTUANTE FINAL */
        #floatingWin { display: none; position: fixed; bottom: 30px; right: 30px; width: 320px; background: #0f0f1c; border: 2px solid #00ff88; border-radius: 20px; padding: 25px; z-index: 9999; box-shadow: 0 10px 50px #000; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .code-box { background: #000; color: #00ff88; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 11px; margin: 15px 0; word-break: break-all; max-height: 100px; overflow-y: auto; border: 1px solid #111; }
        .btn-copy { width: 100%; padding: 12px; background: #00ff88; color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div class="verify-card">
    <h2>VERIFICAÇÃO (0/2)</h2>
    <p style="color:#555; font-size: 14px; margin-bottom: 30px;">Complete as etapas para liberar.</p>

    <a href="https://youtube.com/@blackzwmc?sub_confirmation=1" target="_blank" class="task" onclick="completeTask(1)">
        <span>1. Se inscrever no Canal</span>
        <div class="check" id="c1"></div>
    </a>

    <a href="https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128" target="_blank" class="task" onclick="completeTask(2)">
        <span>2. Ver Anúncio Parceiro</span>
        <div class="check" id="c2"></div>
    </a>

    <button id="unlockBtn" disabled>AGUARDANDO...</button>
</div>

<div id="floatingWin">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; color:#00ff88; font-size:12px;">✅ DESBLOQUEADO</span>
        <span onclick="window.location.href='index.html'" style="cursor:pointer; font-weight:900;">&times;</span>
    </div>
    <div class="code-box" id="finalCode"></div>
    <button class="btn-copy" onclick="copyResult()">COPIAR SCRIPT</button>
</div>

<script>
    let completed = new Set();
    const scriptCode = localStorage.getItem('pendingScript') || "-- Erro: Selecione um script na Home";

    function completeTask(id) {
        completed.add(id);
        document.querySelectorAll('.task')[id-1].classList.add('done');
        document.querySelector('h2').innerText = `VERIFICAÇÃO (${completed.size}/2)`;

        if(completed.size === 2) {
            const btn = document.getElementById('unlockBtn');
            btn.disabled = false;
            btn.classList.add('ready');
            btn.innerText = "LIBERAR CÓDIGO";
        }
    }

    document.getElementById('unlockBtn').onclick = function() {
        document.getElementById('floatingWin').style.display = 'block';
        document.getElementById('finalCode').innerText = scriptCode;
        // Abre o anúncio popunder final
        window.open('https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128', '_blank');
    };

    function copyResult() {
        navigator.clipboard.writeText(scriptCode);
        alert("✨ Script copiado com sucesso!");
    }
</script>
</body>
</html>
