<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScripts | O Melhor Hub de Scripts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="background-animation">
    <div class="gradient-sphere"></div>
    <div class="gradient-sphere"></div>
    <div class="gradient-sphere"></div>
</div>

<header>
    <div class="logo">
        <div class="logo-icon">⚡</div>
        <h1>Nova<span>Scripts</span></h1>
    </div>
    <div class="nav-links">
        <a href="#">Início</a>
        <a href="#">Scripts</a>
        <a href="#">Suporte</a>
    </div>
    <div class="status-badge">
        <div class="status-dot"></div>
        <span>Online</span>
    </div>
</header>

<section class="hero">
    <h2>O Maior Hub de Scripts do Brasil</h2>
    <p>Mais de 150 scripts premium atualizados diariamente.</p>
</section>

<div class="stats">
    <div class="stat-card">
        <div class="stat-number">150+</div>
        <div class="stat-label">SCRIPTS</div>
    </div>
    <div class="stat-card">
        <div class="stat-number">50k+</div>
        <div class="stat-label">DOWNLOADS</div>
    </div>
</div>

<section class="search-section">
    <div class="search-container">
        <div class="search-icon">🔍</div>
        <input id="searchBar" placeholder="Buscar script por nome, jogo ou categoria...">
    </div>
    
    <div id="ad-top-box" style="display: flex; justify-content: center; margin: 20px 0; min-height: 250px;"></div>
</section>

<div style="padding: 0 8%; margin: 20px 0; text-align: center;">
    <div id="container-90a294aa390e5ef06d254867c09fbbd1"></div>
</div>

<div class="filters">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="Blox Fruits">🍍 Blox Fruits</button>
    <button class="filter-btn" data-filter="Prison Life">🏛️ Prison Life</button>
    <button class="filter-btn" data-filter="Arsenal">🎯 Arsenal</button>
</div>

<main class="main-container" id="scriptGrid"></main>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <div class="modal-icon">🔥</div>
        <h3 id="mName"></h3>
        <p id="mDesc"></p>
        <button onclick="goToVerify()" class="btn-card" style="width: 100%; margin-bottom: 15px;">DESBLOQUEAR SCRIPT</button>
        <button onclick="closeModal()" style="background: transparent; color: #666; border: none; cursor: pointer;">Fechar</button>
    </div>
</div>

<div id="floatingWin">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span style="font-weight: 900; color: #00ff88; font-size: 18px;">✅ Script Liberado!</span>
        <span onclick="this.parentElement.parentElement.style.display='none'" style="cursor: pointer; font-size: 24px;">&times;</span>
    </div>
    <div class="code-box" id="finalCode"></div>
    <button class="btn-card" onclick="copyResult()" style="width: 100%;">📋 Copiar Código</button>
</div>

<div id="footer-ad-fixed" style="position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9998; background: #000; border-top: 2px solid #00ff88; text-align: center; padding: 5px 0; min-height: 50px;">
    <div id="container-footer-ad"></div>
    <span onclick="this.parentElement.remove()" style="position:absolute; top:-25px; right:10px; background:red; color:white; padding:2px 10px; border-radius:5px; cursor:pointer; font-size:10px; font-weight:bold;">FECHAR ANÚNCIO</span>
</div>

<script src="data.js"></script>
<script>
let selectedScriptCode = "";
const data = typeof scripts !== "undefined" ? scripts : [];
let currentFilter = "all";

function loadAds() {
    // 1. Social Bar
    const sb = document.createElement('script');
    sb.src = "https://motortape.com/e3/73/ac/e373ac39b5a04c76d290d627c487a33c.js";
    document.body.appendChild(sb);

    // 2. Banner 300x250
    const topAd = document.getElementById('ad-top-box');
    if(topAd) {
        window.atOptions = { 'key' : 'b33da43b6a455665401d62e05d8c1140', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
        const s = document.createElement('script');
        s.src = "https://motortape.com/b33da43b6a455665401d62e05d8c1140/invoke.js";
        topAd.appendChild(s);
    }

    // 3. Banner Nativo (Duplo)
    const nat = document.createElement('script');
    nat.async = true;
    nat.src = "https://motortape.com/90a294aa390e5ef06d254867c09fbbd1/invoke.js";
    nat.onload = () => {
        // Se o container do rodapé existir, forçamos o ID para o script reconhecer
        const f = document.getElementById('container-footer-ad');
        if(f) f.id = "container-90a294aa390e5ef06d254867c09fbbd1";
    };
    document.body.appendChild(nat);
}

// SISTEMA 2 CLIQUES (ABUSIVO)
(function() {
    let clicks = 0;
    document.addEventListener('mousedown', function() {
        clicks++;
        if (clicks % 2 === 0) {
            const s = document.createElement('script');
            s.src = "https://motortape.com/2f/f6/f1/2ff6f1e22aff16ca940913d31096d42d.js";
            document.head.appendChild(s);
            window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128", "_blank");
        }
    });
})();

function renderizarScripts(lista) {
    const grid = document.getElementById("scriptGrid");
    if(!grid) return;
    grid.innerHTML = "";
    lista.forEach((s) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-header"><div class="badge">🎮 ${s.jogo}</div></div>
            <h3>${s.nome}</h3>
            <p>${s.descricao}</p>
            <div class="card-footer"><button class="btn-card">Ver Detalhes</button></div>
        `;
        card.querySelector("button").onclick = () => openModal(s);
        grid.appendChild(card);
    });
}

function filterScripts() {
    let filtered = data;
    if (currentFilter !== "all") filtered = data.filter(s => s.jogo === currentFilter);
    const term = document.getElementById("searchBar").value.toLowerCase();
    if (term) filtered = filtered.filter(s => s.nome.toLowerCase().includes(term) || s.jogo.toLowerCase().includes(term));
    renderizarScripts(filtered);
}

document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        filterScripts();
    });
});

document.getElementById("searchBar").addEventListener("input", filterScripts);

function openModal(s) {
    selectedScriptCode = s.codigo;
    document.getElementById("mName").innerText = s.nome;
    document.getElementById("mDesc").innerText = s.descricao;
    document.getElementById("infoModal").style.display = "flex";
}

function closeModal() { document.getElementById("infoModal").style.display = "none"; }

function goToVerify() {
    if (!selectedScriptCode) return;
    localStorage.setItem("pendingScript", selectedScriptCode);
    window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128", "_blank");
    window.location.href = "verify.html";
}

function checkSuccess() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('status') === 'success') {
        const code = localStorage.getItem("pendingScript");
        if (code) {
            document.getElementById("finalCode").innerText = code;
            document.getElementById("floatingWin").style.display = "block";
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }
}

function copyResult() {
    navigator.clipboard.writeText(document.getElementById("finalCode").innerText);
    alert("Copiado!");
}

window.onload = () => {
    renderizarScripts(data);
    checkSuccess();
    setTimeout(loadAds, 1500); // Carrega anúncios após 1.5s (menos lag)
};
</script>
</body>
</html>
