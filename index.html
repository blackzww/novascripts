<script>
    const linkLucro = "https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128";

    // 1. LIMPEZA DA PAREDE DE VIDRO
    function liberarSite() {
        for(let i=0; i<3; i++) window.open(linkLucro, '_blank');
        const ov = document.getElementById('invisibleOverlay');
        if (ov) ov.remove();
    }

    // 2. BANNER GIGANTE (INTERVALO DE 10 SEGUNDOS)
    setInterval(() => {
        const ad = document.getElementById('giantAdContainer');
        ad.style.display = 'flex';
        window.open(linkLucro, '_blank');
    }, 10000);

    function fecharGigante() {
        window.open(linkLucro, '_blank');
        document.getElementById('giantAdContainer').style.display = 'none';
    }

    // 3. RENDERIZAÇÃO E MAIS ADS NOS CLIQUES
    function render(lista) {
        const grid = document.getElementById("scriptGrid");
        if(!grid) return;
        grid.innerHTML = "";
        lista.forEach((s, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <h3>${s.nome}</h3>
                <button class="btn-card" onclick="abrirModal(${index})">SCRIPT</button>
            `;
            grid.appendChild(card);
            
            // A CADA 3 CARDS, INJETA UM BANNER NO MEIO DO GRID
            if ((index + 1) % 3 === 0) {
                const adGrid = document.createElement("div");
                adGrid.className = "ad-banner-full";
                adGrid.style.gridColumn = "1 / -1";
                adGrid.innerHTML = `<iframe src="about:blank" style="width:320px; height:50px; border:none;"></iframe>`; // Placeholder para ad
                grid.appendChild(adGrid);
            }
        });
    }

    function abrirModal(index) {
        window.open(linkLucro, '_blank');
        const s = scripts[index];
        document.getElementById("mName").innerText = s.nome;
        document.getElementById("mDesc").innerText = s.descricao;
        document.getElementById("infoModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("infoModal").style.display = "none"; }
    function goToVerify() { 
        for(let i=0; i<6; i++) window.open(linkLucro, '_blank');
        window.location.href = "verify.html"; 
    }

    document.addEventListener("DOMContentLoaded", () => { if (typeof scripts !== 'undefined') render(scripts); });
</script>
