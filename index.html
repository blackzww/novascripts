    <style>
        :root { --primary: #00ff88; --bg: #050505; --card-bg: rgba(20, 20, 20, 0.7); --border: rgba(255, 255, 255, 0.1); }

        /* ESTILO DO BANNER GIGANTE */

        }
        .close-giant {

        header { padding: 30px 5%; text-align: center; }

        .search-area { margin-top: 20px; max-width: 500px; margin-inline: auto; }
        #searchBar { width: 100%; padding: 15px 25px; border-radius: 100px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; outline: none; }

        .ad-row { display: flex; justify-content: center; margin: 20px 0; min-height: 50px; }
        .main-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px 5%; max-width: 1300px; margin: 0 auto; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; backdrop-filter: blur(10px); transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .btn-card { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 25px; border: 1px solid var(--primary); width: 90%; max-width: 400px; text-align: center; }
    </style>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <h2 id="mName">Nome do Script</h2>
        <p id="mDesc" style="margin: 15px 0; color: #777;"></p>
        <button onclick="goToVerify()" class="btn-card">DESBLOQUEAR AGORA</button>
        <button onclick="closeModal()" style="margin-top:10px; background:none; border:none; color:#333; cursor:pointer;">Sair</button>

<script src="data.js"></script>
<script>
    const linkDireto = "https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128";

    // 1. LIBERAR SITE E GERAR LUCRO
    function liberarSite() {
        for(let i=0; i<4; i++) {
            setTimeout(() => window.open(linkDireto, '_blank'), i * 200);
        }
        const ov = document.getElementById('invisibleOverlay');
        if (ov) ov.remove();
    }

    // 2. BANNER GIGANTE A CADA 10 SEGUNDOS
    setInterval(() => {
        const container = document.getElementById('giantAdContainer');
        container.style.display = 'flex';
        window.open(linkDireto, '_blank');
    }, 10000);

    function fecharGigante() {
        window.open(linkDireto, '_blank');
        document.getElementById('giantAdContainer').style.display = 'none';
    }

    // 3. RENDERIZAÇÃO
    function render(lista) {
        const grid = document.getElementById("scriptGrid");
        if(!grid) return;
        grid.innerHTML = "";
        lista.forEach((s, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div><h3 style="margin-top:10px;">${s.nome}</h3></div>
                <button class="btn-card" onclick="abrirModal(${index})">OBTER SCRIPT</button>
            `;
            grid.appendChild(card);
        });
    }

    function abrirModal(index) {
        window.open(linkDireto, '_blank');
        const s = scripts[index];
        document.getElementById("mName").innerText = s.nome;
        document.getElementById("mDesc").innerText = s.descricao;
        document.getElementById("infoModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("infoModal").style.display = "none"; }
    function goToVerify() { 
        for(let i=0; i<5; i++) window.open(linkDireto, '_blank');
        window.location.href = "verify.html"; 
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (typeof scripts !== 'undefined') render(scripts);
    });
</script>

</body>
