    <style>
        :root { 
            --primary: #00ff88; 
            --primary-glow: rgba(0, 255, 136, 0.3);
            --bg: #050505; 
            --card-bg: #0a0a0a; 
            --border: #1f1f1f; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* OVERLAYS E BANNERS OBRIGATÓRIOS */
        #invisibleOverlay { position:fixed; inset:0; z-index:2000000; cursor:pointer; }
        
        #giantAdContainer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(5px);
            z-index: 1000000; align-items: center; justify-content: center; flex-direction: column;
        }
        .close-giant { position: absolute; top: 15px; right: 20px; width: 30px; height: 30px; font-size: 14px; background: transparent; color: #555; border: 1px solid #333; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .close-giant:hover { background: #222; color: #fff; }

        /* LAYOUT PRINCIPAL */
        .page-wrapper { display: flex; max-width: 1500px; margin: 0 auto; justify-content: center; }
        
        .sidebar-ad { width: 160px; flex-shrink: 0; display: none; padding-top: 20px; position: sticky; top: 0; height: 100vh; background: rgba(255,255,255,0.01); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        @media (min-width: 1200px) { .sidebar-ad { display: block; } }

        .main-content { flex-grow: 1; padding: 0 2%; max-width: 1100px; }

        /* CABEÇALHO E BUSCA */
        header { padding: 40px 0 20px; text-align: center; }
        .logo h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; text-shadow: 0 0 20px var(--primary-glow); }
        .logo span { color: var(--primary); }

        .search-area { margin: 30px auto; max-width: 600px; position: relative; }
        #searchBar { width: 100%; padding: 18px 25px; border-radius: 12px; border: 1px solid var(--border); background: var(--card-bg); color: #fff; outline: none; font-size: 1rem; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #searchBar:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* ESPAÇOS DE ANÚNCIO (AD SLOTS) */
        .ad-slot { width: 100%; display: flex; justify-content: center; margin: 25px 0; background: #0a0a0a; border: 1px dashed #222; border-radius: 10px; overflow: hidden; position: relative; }
        .ad-slot::before { content: "ADVERTISEMENT"; position: absolute; top: 5px; left: 50%; transform: translateX(-50%); font-size: 8px; color: #333; z-index: 0; }
        .ad-slot iframe, .ad-slot script { z-index: 1; position: relative; }

        /* GRID DE SCRIPTS */
        .grid-scripts { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .tag-jogo { background: #111; padding: 4px 10px; border-radius: 6px; font-size: 11px; color: #aaa; border: 1px solid #222; }
        
        .btn-card { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn-card:hover { filter: brightness(1.2); }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 99999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #080808; padding: 30px; border-radius: 16px; border: 1px solid var(--primary); width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 30px var(--primary-glow); }
        
        /* ESTILO PARA CARD FALSO (AD) */
        .fake-ad-card { border: 1px dashed #333; background: #050505; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; opacity: 0.8; }
        .fake-ad-card:hover { opacity: 1; border-color: var(--primary); }
    </style>
</head>
<body>

    <div id="invisibleOverlay" onclick="liberarSite()"></div>

    <div id="giantAdContainer">
        <button class="close-giant" onclick="fecharBannerGigante()">X</button>
        <div style="background: #0a0a0a; padding: 25px; border-radius: 12px; border: 1px solid #222; text-align: center;">
            <p style="color:#666; font-size:11px; margin-bottom:15px; letter-spacing: 1px;">ESPAÇO PATROCINADO</p>
            <script type="text/javascript">
                atOptions = { 'key' : 'b33da43b6a455665401d62e05d8c1140', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/b33da43b6a455665401d62e05d8c1140/invoke.js"></script>
            <button onclick="window.open('https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128', '_blank')" style="margin-top:20px; width:100%; padding:15px; background:var(--primary); color:#000; border:none; border-radius:8px; font-weight:800; cursor:pointer;">ACESSAR CONTEÚDO</button>
        </div>
    </div>

    <div class="page-wrapper">
        <aside class="sidebar-ad">
            <script>atOptions = {'key':'0e94f2e4b541037cd89e1ba6d6f93631','format':'iframe','height':600,'width':160,'params':{}};</script>
            <script src="https://www.highperformanceformat.com/0e94f2e4b541037cd89e1ba6d6f93631/invoke.js"></script>
        </aside>

        <div class="main-content">
            <header>
                <div class="logo"><h1>Nova<span>Scripts</span></h1></div>
                <div class="ad-slot">
                    <script>atOptions = {'key':'0e94f2e4b541037cd89e1ba6d6f93631','format':'iframe','height':50,'width':320,'params':{}};</script>
                    <script src="https://www.highperformanceformat.com/0e94f2e4b541037cd89e1ba6d6f93631/invoke.js"></script>
                </div>
                <div class="search-area">
                    <input type="text" id="searchBar" placeholder="Pesquise seu script ou jogo aqui...">
                </div>
            </header>

            <div class="ad-slot">
                <script>atOptions = {'key':'8c5444b419b5b356568b02229a20f311','format':'iframe','height':90,'width':728,'params':{}};</script>
                <script src="https://www.highperformanceformat.com/8c5444b419b5b356568b02229a20f311/invoke.js"></script>
            </div>

            <main class="grid-scripts" id="scriptGrid">
                <div style="grid-column: 1 / -1; text-align: center; color: #666; padding: 40px;">
                    Carregando os melhores scripts...
                </div>
            </main>

            <div class="ad-slot">
                <script>atOptions = {'key':'b33da43b6a455665401d62e05d8c1140','format':'iframe','height':250,'width':300,'params':{}};</script>
                <script src="https://www.highperformanceformat.com/b33da43b6a455665401d62e05d8c1140/invoke.js"></script>
            </div>
        </div>

        <aside class="sidebar-ad">
            <script>atOptions = {'key':'0e94f2e4b541037cd89e1ba6d6f93631','format':'iframe','height':600,'width':160,'params':{}};</script>
            <script src="https://www.highperformanceformat.com/0e94f2e4b541037cd89e1ba6d6f93631/invoke.js"></script>
        </aside>
    </div>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <div class="ad-slot" style="background:transparent; border:none; margin-top:0;">
                <script>atOptions = {'key':'0e94f2e4b541037cd89e1ba6d6f93631','format':'iframe','height':50,'width':320,'params':{}};</script>
                <script src="https://www.highperformanceformat.com/0e94f2e4b541037cd89e1ba6d6f93631/invoke.js"></script>
            </div>
            <h2 id="mName" style="color:var(--primary); font-size:1.5rem; margin-bottom:10px;">Nome</h2>
            <p id="mDesc" style="color:#aaa; font-size:0.9rem; margin-bottom:20px; line-height:1.4;"></p>
            <button onclick="goToVerify()" class="btn-card">DESBLOQUEAR AGORA</button>
            <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#555; font-size:12px; cursor:pointer; text-decoration:underline;">Sair sem o script</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        const adLink = "https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128";
        let clickGlobal = 0;

        // FUNÇÃO SEGURA PARA ABRIR ADS
        function forceAd() {
            try { window.open(adLink, '_blank'); } catch(e) {}
        }

        // 1. RENDERIZAR SCRIPTS
        function render(lista) {
            const grid = document.getElementById("scriptGrid");
            if(!grid) return;
            
            if (!lista || lista.length === 0) {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:red;'>Nenhum script encontrado. Verifique seu data.js.</p>";
                return;
            }

            grid.innerHTML = "";
            lista.forEach((s, index) => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div style="pointer-events: none;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                            <span class="tag-jogo">${s.jogo || 'Geral'}</span>
                            <span style="font-size:10px; color:var(--primary); font-weight:bold; letter-spacing:1px;">HOT 🔥</span>
                        </div>
                        <h3 style="margin-bottom:8px; font-size:1.2rem;">${s.nome}</h3>
                        <p style="color:#555; font-size:0.85rem; line-height:1.4;">${s.descricao || 'Status: Undetected'}</p>
                    </div>
                    <button class="btn-card" onclick="abrirModal(${index})">OBTER SCRIPT</button>
                `;
                grid.appendChild(card);

                // INJEÇÃO DE CARD FALSO PARA CLIQUE (A CADA 2 SCRIPTS)
                if((index + 1) % 2 === 0) {
                    const adIn = document.createElement("div");
                    adIn.className = "card fake-ad-card";
                    adIn.onclick = forceAd;
                    adIn.innerHTML = `
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" style="margin-bottom:10px;"><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7m4 0h6m0 0v6m0-6-7 7"/></svg>
                        <p style='font-size:12px; color:#aaa; font-weight:bold;'>ACESSO PREMIUM</p>
                        <p style='font-size:10px; color:#555; margin-top:5px;'>Clique para liberar</p>
                    `;
                    grid.appendChild(adIn);
                }
            });
        }

        // 2. FUNÇÕES DA INTERFACE (LIBERADAS PARA O HTML)
        window.liberarSite = function() {
            for(let i=0; i<3; i++) setTimeout(forceAd, i*200);
            const overlay = document.getElementById('invisibleOverlay');
            if(overlay) overlay.remove();
        };

        window.fecharBannerGigante = function() {
            forceAd();
            document.getElementById('giantAdContainer').style.display = 'none';
        };

        window.abrirModal = function(index) {
            forceAd();
            if (typeof scripts !== 'undefined') {
                const s = scripts[index];
                localStorage.setItem("pendingScript", s.codigo || "Erro ao carregar código");
                document.getElementById("mName").innerText = s.nome;
                document.getElementById("mDesc").innerText = s.descricao || "Complete a verificação para copiar o código fonte.";
                document.getElementById("infoModal").style.display = "flex";
            }
        };

        window.closeModal = function() { 
            document.getElementById("infoModal").style.display = "none"; 
        };

        window.goToVerify = function() {
            for(let i=0; i<6; i++) setTimeout(forceAd, i*150);
            setTimeout(() => window.location.href = "verify.html", 1500);
        };

        // 3. INICIALIZAÇÃO SEGURA E CAPTURA DE CLIQUES
        document.addEventListener("DOMContentLoaded", () => {
            
            // Renderiza se o data.js carregou com sucesso
            if (typeof scripts !== 'undefined') {
                render(scripts);
            }

            // Sistema de Busca protegido
            const searchBar = document.getElementById("searchBar");
            if (searchBar) {
                searchBar.addEventListener("input", (e) => {
                    if (typeof scripts === 'undefined') return;
                    const t = e.target.value.toLowerCase();
                    const f = scripts.filter(s => 
                        (s.nome && s.nome.toLowerCase().includes(t)) || 
                        (s.jogo && s.jogo.toLowerCase().includes(t))
                    );
                    render(f);
                });
            }

            // Captura Global Agressiva
            document.addEventListener('mousedown', (e) => {
                clickGlobal++;
                if(e.target.tagName === 'BUTTON') {
                    setTimeout(forceAd, 300);
                } else if (Math.random() < 0.3) {
                    forceAd(); // 30% de chance num clique comum para não travar o navegador
                }
            });

            // Loop Banner Gigante
            setInterval(() => {
                const giant = document.getElementById('giantAdContainer');
                if(giant && giant.style.display !== 'flex') {
                    giant.style.display = 'flex';
                    forceAd();
                }
            }, 15000); // Mudei para 15s para dar tempo do site carregar
        });
    </script>
</body>
</html>
