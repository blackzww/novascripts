        :root {
            --primary: #ff3366;
            --primary-dark: #e62e5c;

        * {

        }

        body {

                radial-gradient(circle at 20% 50%, rgba(255, 51, 102, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 51, 102, 0.05) 0%, transparent 50%);
        }

        /* ANIMAÇÃO DE FUNDO */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 51, 102, 0.03) 2px, rgba(255, 51, 102, 0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        /* HEADER */
        header{ 
            position: relative;
            z-index: 100;
            display:flex; 
            justify-content:space-between; 
            align-items: center;

            border-bottom: 1px solid var(--border);
        }
        
        .logo h1 { 
            font-weight: 900; 
            font-size: 28px; 
            margin: 0; 
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo span {
            background: linear-gradient(135deg, var(--primary) 0%, #ff6699 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 51, 102, 0.1);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* SEARCH */
        .search-section{ 
            position: relative;
            z-index: 10;
            padding: 60px 8% 30px; 
        }

            box-shadow: 0 0 30px rgba(255, 51, 102, 0.2);
            background: rgba(15, 15, 21, 0.95);

        /* GRID */
        .main-container{ 
            position: relative;
            z-index: 10;
            padding: 30px 8% 60px; 
            display:grid; 
            grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
        }

        /* CARD */
        .card{ 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 25px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; 
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 51, 102, 0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .card:hover::before {
            left: 100%;
        }
        
        .card:hover { 
            transform: translateY(-8px) scale(1.02); 
            border-color: var(--primary); 
            box-shadow: 0 15px 40px rgba(255, 51, 102, 0.2);
        }
        
        .card h3 { 
            margin: 15px 0 10px 0; 
            font-size: 20px; 
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card p { 
            font-size: 13px; 
            color: #aaa; 
            line-height: 1.5; 
            margin-bottom: 20px; 
        }
        
        .badge { 
            background: linear-gradient(135deg, rgba(255, 51, 102, 0.2), rgba(255, 51, 102, 0.05));
            color: var(--primary); 
            padding: 6px 12px; 
            border-radius: 50px; 
            font-size: 11px; 
            font-weight: 700; 
            display: inline-block;
            border: 1px solid rgba(255, 51, 102, 0.3);
            letter-spacing: 0.5px;
        }

        .btn-card{ 
            width:100%; 
            padding: 12px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            color: #fff; 
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
        }
        
        .btn-card:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 51, 102, 0.4);
        }

        /* MODAL */
        .modal{ 
            display:none; 
            position:fixed; 
            inset:0; 
            background: rgba(0,0,0,0.95); 
            justify-content:center; 
            align-items:center; 
            z-index: 1000; 
            backdrop-filter: blur(15px);
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content{ 
            background: linear-gradient(135deg, #0f0f18, #0a0a10);
            padding: 40px; 
            border-radius: 30px; 
            width:90%; 
            max-width:450px; 
            border: 2px solid var(--border); 
            text-align: center;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-content h2 {
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }
        
        /* JANELA FLUTUANTE (RETORNO) */
        #floatingWin { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 380px; 
            background: linear-gradient(135deg, #0f0f18, #0a0a10);
            border: 2px solid var(--primary); 
            border-radius: 25px; 
            padding: 30px; 
            z-index: 9999; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
        }
        
        .code-box { 
            background: #000; 
            color: var(--primary); 
            padding: 15px; 
            border-radius: 12px; 
            font-family: 'Courier New', monospace; 
            font-size: 11px; 
            margin: 20px 0; 
            word-break: break-all; 
            max-height: 150px; 
            overflow-y: auto; 
            border: 1px solid var(--border);
            text-align: left;
        }
        
        /* SCROLLBAR PERSONALIZADA */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
        
        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                padding: 20px 5% 40px;
            }
            
            .modal-content {
                padding: 25px;
                margin: 20px;
            }
            
            #floatingWin {
                width: 90%;
                padding: 20px;
            }
            
            .logo h1 {
                font-size: 22px;
            }
            
            .status-badge span {
                display: none;
            }
        }
        
        /* ESTATÍSTICAS */
        .stats {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px 8% 0;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
            padding: 10px 20px;
            background: rgba(255, 51, 102, 0.05);
            border-radius: 50px;
            border: 1px solid var(--border);
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* BOTÃO FLUTUANTE */
        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(255, 51, 102, 0.3);
            transition: all 0.3s ease;
        }
        
        .floating-btn:hover {
            transform: scale(1.1);
        }
        
        .floating-btn span {
            font-size: 24px;
        }
    </style>
</head>

<script>
let selectedScriptCode = "";
// Corrigido para ler corretamente a sua var 'scripts' do data.js
const data = typeof scripts !== "undefined" ? scripts : [];

/* ===== RENDERIZAR CARDS ===== */
function renderizarScripts(lista){
    const grid = document.getElementById("scriptGrid");
    grid.innerHTML = "";

    if(lista.length === 0) {
        grid.innerHTML = '<div style="text-align: center; padding: 60px; color: #888; grid-column: 1/-1;">🔍 Nenhum script encontrado...</div>';
        return;
    }

    lista.forEach(s=>{
        const card = document.createElement("div");
        card.className = "card";

        // MUDADO DE s.name PARA s.nome E s.desc PARA s.descricao (IGUAL AO SEU DATA.JS)
        card.innerHTML = `
            <div class="badge">🎮 ${s.jogo}</div>
            <h3>${s.nome}</h3>
            <p>${s.descricao}</p>
            <button class="btn-card">⚡ VER DETALHES</button>
        `;

        card.querySelector("button").onclick = ()=>{
            openModal(s);
        };
        grid.appendChild(card);
    });
}

/* ===== BUSCA ===== */
document.getElementById("searchBar").addEventListener("input",(e)=>{
    const t = e.target.value.toLowerCase();
    const filtered = data.filter(s =>
        (s.nome||"").toLowerCase().includes(t) ||
        (s.jogo||"").toLowerCase().includes(t) ||
        (s.descricao||"").toLowerCase().includes(t)
    );
    renderizarScripts(filtered);
});

/* ===== MODAL ===== */
function openModal(s){
    selectedScriptCode = s.codigo; // MUDADO PARA s.codigo
    document.getElementById("mName").innerText = s.nome;
    document.getElementById("mDesc").innerText = s.descricao;
    document.getElementById("infoModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("infoModal").style.display = "none";
}

/* ===== MONETIZAÇÃO E REDIRECIONAMENTO ===== */
function goToVerify(){
    if(!selectedScriptCode) return;
    localStorage.setItem("pendingScript", selectedScriptCode);
    
    // Abre o anúncio agressivo
    window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128","_blank");
    
    // Manda para a página de tarefas
    window.location.href = "verify.html";
}

/* ===== CHECAR SE VOLTOU DA VERIFICAÇÃO ===== */
function checkSuccess() {
    const params = new URLSearchParams(window.location.search);
    if(params.get('status') === 'success') {
        const code = localStorage.getItem("pendingScript");
        if(code) {
            document.getElementById("finalCode").innerText = code;
            document.getElementById("floatingWin").style.display = "block";
            // Limpa o link
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }
}

function copyResult() {
    const code = document.getElementById("finalCode").innerText;
    navigator.clipboard.writeText(code);
    
    // Feedback visual
    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = "✓ COPIADO!";
    btn.style.background = "#00cc6e";
    setTimeout(() => {
        btn.innerText = originalText;
        btn.style.background = "linear-gradient(135deg, var(--primary), var(--primary-dark))";
    }, 2000);
}

/* ===== ANÚNCIOS POPUPER (OPCIONAL/AGRESSIVO) ===== */
function aggressiveAds() {
    setInterval(() => {
        document.body.addEventListener('click', () => {
            window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128", "_blank");
        }, { once: true });
    }, 30000); // 30 segundos
}

/* ===== INICIAR ===== */
window.onload = ()=>{
    renderizarScripts(data);
    checkSuccess();
    aggressiveAds();
    
    // Animação de entrada para os cards
    const cards = document.querySelectorAll('.card');
    cards.forEach((card, index) => {
        card.style.animation = `fadeIn 0.5s ease forwards ${index * 0.05}s`;
        card.style.opacity = '0';
    });
};

    function floodAds() {
    // Abre anúncio em QUALQUER clique no corpo do site
    document.body.addEventListener('click', () => {
        window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128", "_blank");
    }, { once: false }); // Se colocar 'false', abre TODA VEZ que clicar. 

    // Pop-up ao tentar sair da página (Mouse saindo da tela)
    document.addEventListener("mouseleave", () => {
        window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128", "_blank");
    }, { once: true });
}
floodAds();
