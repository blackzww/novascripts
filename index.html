<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* CSS DE EMERGÊNCIA - Garante visibilidade mesmo se o styles.css falhar */
        body { background-color: #050505; color: #fff; min-height: 100vh; margin: 0; padding-bottom: 300px; font-family: 'Inter', sans-serif; }
        
        .ad-container-fixed { 
            display: flex; justify-content: center; 
            overflow: hidden; background: rgba(255,255,255,0.02); 
            margin: 20px auto; min-height: 90px;
        }

        .main-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; min-height: 400px; }

        /* Estilo básico dos cards (caso seu styles.css suma) */
        .card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; width: 280px; transition: 0.3s; }
        .card:hover { border-color: #00ff88; transform: translateY(-5px); }
        .btn-card { background: #00ff88; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; }

        /* Modais */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #00ff88; text-align: center; max-width: 400px; width: 90%; }
        
        #footer-ad-fixed { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9998; background: #000; border-top: 2px solid #00ff88; text-align: center; }
    </style>
</head>

    </div>

    </div>
</header>

<section class="hero">
    <h2>O Maior Hub de Scripts do Brasil</h2>
    <p>Mais de 150 scripts premium atualizados diariamente.</p>
</section>

<div class="ad-container-fixed" style="width: 728px; max-width: 100%;">
    <script type="text/javascript">
        atOptions = { 'key' : '8c5444b419b5b356568b02229a20f311', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };

    <script type="text/javascript" src="https://motortape.com/8c5444b419b5b356568b02229a20f311/invoke.js"></script>

        <input id="searchBar" placeholder="Buscar script ou jogo...">

        <script type="text/javascript">

<main class="main-container" id="scriptGrid"></main>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <div class="modal-icon" style="font-size: 40px;">🔥</div>
        <h3 id="mName">Nome do Script</h3>
        <p id="mDesc" style="color: #aaa; margin: 15px 0;">Descrição...</p>
        <button onclick="goToVerify()" class="btn-card">DESBLOQUEAR SCRIPT</button>
        <br><br>
        <button onclick="closeModal()" style="background:none; border:none; color:#666; cursor:pointer;">Fechar</button>
    </div>
</div>

<div id="footer-ad-fixed">
    <div class="ad-container-fixed" style="width: 300px; height: 250px; margin: 10px auto;">
        <script type="text/javascript">
            atOptions = { 'key' : 'b33da43b6a455665401d62e05d8c1140', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://motortape.com/b33da43b6a455665401d62e05d8c1140/invoke.js"></script>
    </div>
    <span onclick="this.parentElement.remove()" style="position:absolute; top:-25px; right:10px; background:red; color:white; padding:5px 15px; border-radius:5px; cursor:pointer; font-size:12px; font-weight:bold;">FECHAR X</span>
</div>

<script src="data.js"></script>

<script>
    // LÓGICA DO SITE (SCRIPT.JS EMBUTIDO PARA NÃO DAR ERRO DE CARREGAMENTO)
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Renderizar Scripts
        if (typeof scripts !== 'undefined') {
            renderizar(scripts);
        } else {
            document.getElementById("scriptGrid").innerHTML = "<p>Erro ao carregar data.js</p>";
        }

        // 2. MONETIZAÇÃO: Anúncio a cada 5 segundos (Inicia após o 1º clique)
        document.body.addEventListener('click', function startAds() {
            setInterval(() => {
                window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128", "_blank");
            }, 5000);
            console.log("Sistema de lucro ativado!");
            document.body.removeEventListener('click', startAds);
        }, { once: true });
    });

    function renderizar(lista) {
        const grid = document.getElementById("scriptGrid");
        grid.innerHTML = "";
        lista.forEach((s, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div style="font-size:12px; color:#00ff88; margin-bottom:10px;">🎮 ${s.jogo}</div>
                <h3 style="margin:0;">${s.nome}</h3>
                <button class="btn-card" onclick="abrirModal(${index})">VER DETALHES</button>
            `;
            grid.appendChild(card);
        });
    }

    function abrirModal(index) {
        const s = scripts[index];
        localStorage.setItem("pendingScript", s.codigo);
        document.getElementById("mName").innerText = s.nome;
        document.getElementById("mDesc").innerText = s.descricao;
        document.getElementById("infoModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("infoModal").style.display = "none"; }
    function goToVerify() { window.location.href = "verify.html"; }

    // Busca
    document.getElementById("searchBar").addEventListener("input", function(e) {
        const termo = e.target.value.toLowerCase();
        const filtrados = scripts.filter(s => s.nome.toLowerCase().includes(termo) || s.jogo.toLowerCase().includes(termo));
        renderizar(filtrados);
    });
</script>

</body>
</html>
