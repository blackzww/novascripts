<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NovaScripts 3.0 | Biblioteca de Scripts Roblox</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Estilos Críticos para Estabilidade */
        #container-90a294aa390e5ef06d254867c09fbbd1 { min-height: 90px; background: #050509; display: flex; align-items: center; justify-content: center; }
        .ad-modal-slot { min-height: 250px; background: #050509; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; margin: 15px 0; }
        #scriptsGrid { min-height: 400px; } /* Evita que o site "encolha" enquanto carrega */
    </style>
</head>
<body>

    <div id="antiAdblocker" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,5,9,0.98); z-index:9999999; text-align:center; padding-top:100px; backdrop-filter: blur(10px);">
        <div style="background:#1a1a2e; width:90%; max-width:450px; margin:auto; padding:40px; border:2px solid #00ff88; border-radius:15px; box-shadow: 0 0 30px rgba(0,255,136,0.2);">
            <h2 style="color:#fff; margin-bottom:20px;">🚫 ADBLOCK DETECTADO!</h2>
            <p style="color:#ccc;">Para manter a <strong>NovaScripts</strong> gratuita, desative o Adblock e recarregue a página.</p>
            <button onclick="window.location.reload()" style="margin-top:25px; background:#00ff88; color:#000; border:none; padding:15px 30px; border-radius:8px; font-weight:bold; cursor:pointer; width:100%;">RECARREGAR</button>
        </div>
    </div>

    <div id="clickOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:999998; cursor:pointer;"></div>

    <div class="loader-wrapper" id="loader">
        <div class="loader-ring"></div>
        <p>Carregando NovaScripts...</p>
    </div>

    <div class="site-wrapper">
        <header class="topbar">
            <div class="logo-box">
                <h1>Nova<span>Scripts</span></h1>
            </div>
            <nav class="navbar">
                <a href="#" class="active">Início</a>
                <a href="#biblioteca">Biblioteca</a>
            </nav>
            <div class="user-stats">
                <div class="online-box"><span class="dot"></span><span id="onlineCount">524</span></div>
            </div>
        </header>

        <div style="width: 100%; display: flex; justify-content: center; padding: 15px 0;">
            <div id="container-90a294aa390e5ef06d254867c09fbbd1"></div>
        </div>

        <section class="search-page">
            <div class="big-search-box">
                <input type="text" id="searchInput" placeholder="Nome do jogo ou script...">
                <button id="searchBtn">Buscar</button>
            </div>
        </section>

        <section class="scripts-section" id="biblioteca">
            <div class="scripts-grid" id="scriptsGrid"></div>
        </section>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-top">
                <h3 id="modalTitle">Script</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="ad-modal-slot" id="modalAdContainer">
                </div>
            <div class="code-shortener">
                <div class="code-preview" id="codePreview" style="filter:blur(10px);">CONTEÚDO BLOQUEADO!</div>
            </div>
            <button id="copyModalBtn" class="btn-copy-primary" style="width:100%; height:60px;">🚀 DESBLOQUEAR AGORA</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>

    <script>
        // 1. GESTÃO DO CARREGAMENTO (SISTEMA REAL)
        function finalizeLoading() {
            const loader = document.getElementById('loader');
            if (loader && loader.style.display !== 'none') {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }
        }

        // Carrega o conteúdo assim que o DOM estiver pronto (Não espera anúncios)
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderCards === 'function') renderCards();
            setTimeout(finalizeLoading, 2000); // Garante que o loader suma em 2s
        });

        // 2. INJEÇÃO DOS ANÚNCIOS (SÓ DEPOIS DO SITE ESTAR PRONTO)
        window.addEventListener('load', () => {
            // Injeção do Banner Topo
            const topAd = document.createElement('script');
            topAd.src = "//motortape.com/90a294aa390e5ef06d254867c09fbbd1/invoke.js";
            topAd.async = true;
            document.getElementById('container-90a294aa390e5ef06d254867c09fbbd1').appendChild(topAd);

            // Injeção do Social Bar / Popunder
            const externalAds = [
                "https://motortape.com/e3/73/ac/e373ac39b5a04c76d290d627c487a33c.js",
                "https://pl29290457.profitablecpmratenetwork.com/2f/f6/f1/2ff6f1e22aff16ca940913d31096d42d.js"
            ];
            externalAds.forEach(src => {
                const s = document.createElement('script');
                s.src = src;
                s.async = true;
                document.body.appendChild(s);
            });
        });

        // 3. LÓGICA DE MONETIZAÇÃO
        document.getElementById('clickOverlay').addEventListener('click', function() {
            window.open('https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128', '_blank');
            this.remove();
        });

        // 4. ANTI-ADBLOCK (CHECA APÓS 5 SEGUNDOS)
        setTimeout(() => {
            const testAd = document.getElementById('container-90a294aa390e5ef06d254867c09fbbd1');
            if (!testAd || testAd.offsetHeight === 0) {
                document.getElementById('antiAdblocker').style.display = 'block';
            }
        }, 5000);
    </script>

</body>
</html>
