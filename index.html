<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaScripts | Ultimate Script Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo"><h1>Nova<span>Scripts</span></h1></div>
    <div class="status-badge">
        <div class="status-dot"></div>
        <span style="color:var(--primary);font-weight:600; font-size: 12px;">SERVIDOR ATIVO</span>
    </div>
</header>

<div class="stats">
    <div class="stat-item">
        <div class="stat-number">150+</div>
        <div class="stat-label">SCRIPTS</div>
    </div>
    <div class="stat-item">
        <div class="stat-number">99%</div>
        <div class="stat-label">SEGURANÇA</div>
    </div>
    <div class="stat-item">
        <div class="stat-number">24/7</div>
        <div class="stat-label">SUPORTE</div>
    </div>
</div>

<section class="search-section">
    <div class="search-container">
        <div class="search-icon">🔍</div>
        <input id="searchBar" placeholder="Buscar scripts por jogo, nome ou descrição...">
    </div>
</section>

<main class="main-container" id="scriptGrid"></main>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <h2 id="mName" style="margin-bottom: 10px;"></h2>
        <p id="mDesc" style="color: #888; margin-bottom: 25px; line-height: 1.6;"></p>
        <button onclick="goToVerify()" class="btn-card">🔥 DESBLOQUEAR SCRIPT 🔥</button>
        <button onclick="closeModal()" style="background:transparent; color:#666; border:none; margin-top:20px; cursor:pointer; font-weight:600; transition:0.3s;">FECHAR</button>
    </div>
</div>

<div id="floatingWin">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
        <span style="font-weight:900; color:var(--primary); font-size:16px;">✅ SCRIPT LIBERADO!</span>
        <span onclick="this.parentElement.parentElement.style.display='none'" style="cursor:pointer; font-size: 24px; color:#888;">&times;</span>
    </div>
    <p style="font-size: 12px; color: #aaa;">Copie e cole no seu executor (Delta, Fluxus, etc):</p>
    <div class="code-box" id="finalCode"></div>
    <button class="btn-card" onclick="copyResult()">📋 COPIAR PARA ÁREA DE TRANSFERÊNCIA</button>
</div>

<div class="floating-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
    <span>↑</span>
</div>

<script src="data.js"></script>
<script>
let selectedScriptCode = "";
const data = typeof scripts !== "undefined" ? scripts : [];

/* ===== RENDERIZAR CARDS ===== */
function renderizarScripts(lista){
    const grid = document.getElementById("scriptGrid");
    grid.innerHTML = "";

    if(lista.length === 0) {
        grid.innerHTML = '<div style="text-align: center; padding: 60px; color: #888; grid-column: 1/-1;">🔍 Nenhum script encontrado...</div>';
        return;
    }

    lista.forEach((s, index)=>{
        const card = document.createElement("div");
        card.className = "card";
        card.style.animation = `fadeInCard 0.5s ease forwards ${index * 0.05}s`;
        card.style.opacity = "0";

        card.innerHTML = `
            <div class="badge">🎮 ${s.jogo}</div>
            <h3>${s.nome}</h3>
            <p>${s.descricao}</p>
            <button class="btn-card">⚡ VER DETALHES</button>
        `;

        card.querySelector("button").onclick = ()=>{
            openModal(s);
        };
        grid.appendChild(card);
    });
}

/* ===== BUSCA ===== */
document.getElementById("searchBar").addEventListener("input",(e)=>{
    const t = e.target.value.toLowerCase();
    const filtered = data.filter(s =>
        (s.nome||"").toLowerCase().includes(t) ||
        (s.jogo||"").toLowerCase().includes(t) ||
        (s.descricao||"").toLowerCase().includes(t)
    );
    renderizarScripts(filtered);
});

/* ===== MODAL ===== */
function openModal(s){
    selectedScriptCode = s.codigo;
    document.getElementById("mName").innerText = s.nome;
    document.getElementById("mDesc").innerText = s.descricao;
    document.getElementById("infoModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("infoModal").style.display = "none";
}

/* ===== REDIRECIONAMENTO ===== */
function goToVerify(){
    if(!selectedScriptCode) return;
    localStorage.setItem("pendingScript", selectedScriptCode);
    window.location.href = "verify.html";
}

/* ===== CHECAR SE VOLTOU DA VERIFICAÇÃO ===== */
function checkSuccess() {
    const params = new URLSearchParams(window.location.search);
    if(params.get('status') === 'success') {
        const code = localStorage.getItem("pendingScript");
        if(code) {
            document.getElementById("finalCode").innerText = code;
            document.getElementById("floatingWin").style.display = "block";
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }
}

function copyResult() {
    const code = document.getElementById("finalCode").innerText;
    navigator.clipboard.writeText(code);
    
    const btn = event.target;
    const originalText = btn.innerText;
    btn.innerText = "✓ COPIADO!";
    btn.style.background = "#00cc6e";
    setTimeout(() => {
        btn.innerText = originalText;
        btn.style.background = "linear-gradient(135deg, var(--primary), var(--primary-dark))";
    }, 2000);
}

/* ===== INICIAR ===== */
window.onload = ()=>{
    renderizarScripts(data);
    checkSuccess();
};
</script>

</body>
</html>
