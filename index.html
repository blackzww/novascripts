        }

        .ad-row { display: flex; justify-content: center; margin: 20px 0; min-height: 50px; width: 100%; }
        
        .main-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; padding: 20px 5%; max-width: 1300px; margin: 0 auto;
        }

        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; backdrop-filter: blur(10px); transition: 0.3s;

        .card:hover { border-color: var(--primary); transform: translateY(-5px); }

        }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 25px; border: 1px solid var(--primary); width: 90%; max-width: 400px; text-align: center; }

<script src="data.js"></script>
<script>
    const linkDireto = "https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128";

    // 1. FUNÇÃO QUE DESTRÓI O OVERLAY E ABRE OS ADS
    function liberarEGerarLucro() {
        // Rajada de 4 ads no primeiro toque
        for(let i=0; i<4; i++) {
            setTimeout(() => window.open(linkDireto, '_blank'), i * 200);
        }
        // Remove o bloqueio invisível para permitir clicar nos botões do site
        const ov = document.getElementById('invisibleOverlay');
        if (ov) ov.remove();
    }

    // 2. SISTEMA INTERSTITIAL (A CADA 10 SEGUNDOS)
    setInterval(() => {
        document.getElementById('giantAd').style.display = 'flex';
        // Abre um ad automático ao aparecer
        window.open(linkDireto, '_blank');
    }, 10000);

    function fecharGigante() {
        // Tentar fechar o ad também gera um clique de lucro
        window.open(linkDireto, '_blank');
        document.getElementById('giantAd').style.display = 'none';
    }

    // 3. MOTOR DE RENDERIZAÇÃO
    function render(lista) {
        const grid = document.getElementById("scriptGrid");
        if(!grid) return;
        grid.innerHTML = "";
        lista.forEach((s, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div>
                    <div style="margin-bottom:10px;"><span class="tag-jogo">${s.jogo}</span></div>
                    <h3 style="font-size:1.2rem; margin-bottom:8px;">${s.nome}</h3>
                    <p style="font-size:0.8rem; color:#666;">${s.descricao}</p>
                </div>
                <button class="btn-card" onclick="abrirModal(${index})">OBTER SCRIPT</button>
            `;
            grid.appendChild(card);
        });
    }

    // 4. CLIQUES AGRESSIVOS
    function abrirModal(index) {
        // Abre 2 ads ao clicar no script
        window.open(linkDireto, '_blank');
        window.open(linkDireto, '_blank');

        const s = scripts[index];
        document.getElementById("mName").innerText = s.nome;
        document.getElementById("mDesc").innerText = s.descricao;
        document.getElementById("infoModal").style.display = "flex";
        localStorage.setItem("scriptPendente", s.codigo);
    }

    function closeModal() { document.getElementById("infoModal").style.display = "none"; }
    
    function goToVerify() { 
        // 5 ADS antes de sair para o verificador
        for(let i=0; i<5; i++) window.open(linkDireto, '_blank');
        window.location.href = "verify.html"; 
    }

    // 5. BUSCA DINÂMICA
    document.getElementById("searchBar").addEventListener("input", (e) => {
        const t = e.target.value.toLowerCase();
        const f = scripts.filter(s => s.nome.toLowerCase().includes(t) || s.jogo.toLowerCase().includes(t));
        render(f);
    });

    document.addEventListener("DOMContentLoaded", () => {
        if (typeof scripts !== 'undefined') render(scripts);
    });
</script>

</body>
