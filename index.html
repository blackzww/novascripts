<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

</head>
<body>

<div class="background-animation">

</div>

<header>

    </div>
    <div class="nav-links">

        <a href="#">Scripts</a>
        <a href="#">Suporte</a>
    </div>
    <div class="status-badge">
        <div class="status-dot"></div>
        <span>Online</span>
    </div>
</header>

<section class="hero">
    <h2>O Maior Hub de Scripts do Brasil</h2>
    <p>Mais de 150 scripts premium atualizados diariamente.</p>
</section>

<section class="search-section">
    <div class="search-container">
        <div class="search-icon">🔍</div>
        <input id="searchBar" placeholder="Buscar script por nome, jogo...">
    </div>

    <div style="display: flex; justify-content: center; margin: 20px 0; min-height: 250px;">
        <script>
            atOptions = { 'key' : 'b33da43b6a455665401d62e05d8c1140', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} };
        </script>
        <script src="https://motortape.com/b33da43b6a455665401d62e05d8c1140/invoke.js"></script>
    </div>
</section>

<div style="padding: 0 8%; margin-bottom: 20px; text-align: center;">
    <script async="async" data-cfasync="false" src="https://motortape.com/90a294aa390e5ef06d254867c09fbbd1/invoke.js"></script>
    <div id="container-90a294aa390e5ef06d254867c09fbbd1"></div>
</div>

<div class="filters">
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="Blox Fruits">🍍 Blox Fruits</button>
    <button class="filter-btn" data-filter="Arsenal">🎯 Arsenal</button>
    <button class="filter-btn" data-filter="MM2">🔪 MM2</button>
</div>

<main class="main-container" id="scriptGrid"></main>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <div class="modal-icon">🔥</div>
        <h3 id="mName"></h3>
        <p id="mDesc"></p>
        <button onclick="goToVerify()" class="btn-card" style="width: 100%; margin-bottom: 15px;">DESBLOQUEAR SCRIPT</button>
        <button onclick="closeModal()" style="background: transparent; color: #666; border: none; cursor: pointer;">Fechar</button>
    </div>
</div>

<div id="floatingWin">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span style="font-weight: 900; color: #00ff88; font-size: 18px;">✅ Liberado!</span>
        <span onclick="this.parentElement.parentElement.style.display='none'" style="cursor: pointer; font-size: 24px;">&times;</span>
    </div>
    <div class="code-box" id="finalCode"></div>
    <button class="btn-card" onclick="copyResult()" style="width: 100%;">📋 Copiar Código</button>
</div>

<div style="position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9999; background: #000; border-top: 2px solid #00ff88; text-align: center; padding: 5px 0;">
    <div id="container-90a294aa390e5ef06d254867c09fbbd1-footer">
        <script async="async" data-cfasync="false" src="https://motortape.com/90a294aa390e5ef06d254867c09fbbd1/invoke.js"></script>
    </div>
</div>

<script src="data.js"></script>
<script>
let selectedScriptCode = "";
const data = typeof scripts !== "undefined" ? scripts : [];
let currentFilter = "all";

// ==========================================
// SISTEMA ABUSIVO: ANÚNCIO A CADA 2 CLIQUES
// ==========================================
(function() {
    let clickCounter = 0;
    document.addEventListener('click', function() {
        clickCounter++;
        if (clickCounter % 2 === 0) {
            // Abre seu link de lucro direto
            window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128", "_blank");
        }
    });
})();

function renderizarScripts(lista) {
    const grid = document.getElementById("scriptGrid");
    grid.innerHTML = "";
    lista.forEach((s, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-header"><div class="badge">🎮 ${s.jogo}</div></div>
            <h3>${s.nome}</h3>
            <p>${s.descricao}</p>
            <div class="card-footer"><button class="btn-card">Ver Detalhes</button></div>
        `;
        card.querySelector("button").onclick = () => openModal(s);
        grid.appendChild(card);
    });
}

function filterScripts() {
    let filtered = data;
    if (currentFilter !== "all") filtered = data.filter(s => s.jogo === currentFilter);
    const sTerm = document.getElementById("searchBar").value.toLowerCase();
    if (sTerm) {
        filtered = filtered.filter(s => s.nome.toLowerCase().includes(sTerm) || s.jogo.toLowerCase().includes(sTerm));
    }
    renderizarScripts(filtered);
}

document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        filterScripts();
    });
});

document.getElementById("searchBar").addEventListener("input", filterScripts);

function openModal(s) {
    selectedScriptCode = s.codigo;
    document.getElementById("mName").innerText = s.nome;
    document.getElementById("mDesc").innerText = s.descricao;
    document.getElementById("infoModal").style.display = "flex";
}

function closeModal() { document.getElementById("infoModal").style.display = "none"; }

function goToVerify() {
    if (!selectedScriptCode) return;
    localStorage.setItem("pendingScript", selectedScriptCode);
    // Popunder antes de sair
    window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128", "_blank");
    window.location.href = "verify.html";
}

function checkSuccess() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('status') === 'success') {
        const code = localStorage.getItem("pendingScript");
        if (code) {
            document.getElementById("finalCode").innerText = code;
            document.getElementById("floatingWin").style.display = "block";
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    }
}

function copyResult() {
    const code = document.getElementById("finalCode").innerText;
    navigator.clipboard.writeText(code);
    alert("Copiado!");
}

window.onload = () => {
    renderizarScripts(data);
    checkSuccess();
};
</script>
</body>
</html>
