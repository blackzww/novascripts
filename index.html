    <style>
        :root { --primary: #00ff88; --bg: #050505; --card-bg: rgba(20, 20, 20, 0.8); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* BANNER GIGANTE (INTERSTITIAL) */
        #giantAdContainer {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.99);
            z-index: 1000000; align-items: center; justify-content: center; flex-direction: column;
        }
        .close-giant { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; font-size: 8px; background: #111; color: #333; border: 1px solid #222; cursor: pointer; }

        header { padding: 20px 5%; text-align: center; border-bottom: 1px solid var(--border); }
        .logo h1 { font-size: 2.5rem; font-weight: 800; }
        .logo span { color: var(--primary); }

        /* CONTAINER DE ADS */
        .ad-slot { width: 100%; display: flex; justify-content: center; margin: 15px 0; min-height: 50px; background: rgba(255,255,255,0.01); padding: 10px; }
        
        .main-layout { display: flex; max-width: 1500px; margin: 0 auto; padding: 0 2%; }
        
        /* LATERAIS (SKYSCRAPERS) */
        .side-ads { width: 160px; flex-shrink: 0; display: none; padding-top: 20px; }
        @media (min-width: 1200px) { .side-ads { display: block; } }

        .content-area { flex-grow: 1; padding: 0 20px; }

        .search-area { margin: 20px auto; max-width: 600px; }
        #searchBar { width: 100%; padding: 15px 25px; border-radius: 50px; border: 1px solid var(--border); background: #111; color: #fff; outline: none; }

        .grid-scripts { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 20px; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--primary); transform: scale(1.02); }
        .btn-card { background: var(--primary); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 99999; align-items: center; justify-content: center; }
        .modal-content { background: #000; padding: 25px; border-radius: 20px; border: 2px solid var(--primary); width: 90%; max-width: 400px; text-align: center; }
    </style>

<script src="data.js"></script>
<script>
    const directLink = "https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128";

    // 1. ATIVAÇÃO DE LUCRO INICIAL
    function ativarLucro() {
        for(let i=0; i<4; i++) window.open(directLink, '_blank');
        const overlay = document.getElementById('firstClickOverlay');
        if (overlay) overlay.remove();
    }

    // 2. LOOP DO BANNER GIGANTE (10 SEGUNDOS)
    setInterval(() => {
        document.getElementById('giantAdContainer').style.display = 'flex';
        window.open(directLink, '_blank');
    }, 10000);

    function fecharBannerGigante() {
        window.open(directLink, '_blank');
        document.getElementById('giantAdContainer').style.display = 'none';
    }

    // 3. RENDERIZAÇÃO COM INJEÇÃO DE ADS NO MEIO
    function render(lista) {
        const grid = document.getElementById("scriptGrid");
        if(!grid) return;
        grid.innerHTML = "";
        
        lista.forEach((s, index) => {
            // Card do Script
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <h3 style="font-size:1.1rem; color:var(--primary);">${s.nome}</h3>
                <p style="font-size:0.8rem; color:#666; margin-top:5px;">${s.jogo}</p>
                <button class="btn-card" onclick="abrirModal(${index})">OBTER</button>
            `;
            grid.appendChild(card);

            // INJETA UM ANÚNCIO A CADA 2 CARDS
            if ((index + 1) % 2 === 0) {
                const adInjected = document.createElement("div");
                adInjected.className = "card";
                adInjected.style.border = "1px dashed #333";
                adInjected.innerHTML = `
                    <p style="font-size:9px; color:#333; text-align:center;">AD</p>
                    <div style="height:100px; display:flex; align-items:center; justify-content:center; color:#222; font-size:10px;">
                        Carregando Anúncio...
                    </div>
                `;
                grid.appendChild(adInjected);
            }
        });
    }

    function abrirModal(index) {
        window.open(directLink, '_blank');
        const s = scripts[index];
        document.getElementById("mName").innerText = s.nome;
        document.getElementById("mDesc").innerText = s.descricao;
        document.getElementById("infoModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("infoModal").style.display = "none"; }
    
    function goToVerify() { 
        for(let i=0; i<6; i++) window.open(directLink, '_blank');
        window.location.href = "verify.html"; 
    }

    document.addEventListener("DOMContentLoaded", () => {
        if (typeof scripts !== 'undefined') render(scripts);
    });

    // SISTEMA DE BUSCA
    document.getElementById("searchBar").addEventListener("input", (e) => {
        const t = e.target.value.toLowerCase();
        const f = scripts.filter(s => s.nome.toLowerCase().includes(t) || s.jogo.toLowerCase().includes(t));
        render(f);
    });
</script>
