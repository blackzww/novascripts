<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* CSS PARA O SISTEMA ABUSIVO */
        #overlayAbusivo {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .banner-content {
            position: relative;
            width: 90%;
            max-width: 420px;
            padding: 50px 20px;
            background: #0a0a0a;
            border: 3px solid #00ff88;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.2);
        }
        #fakeCloseBtn {
            position: absolute;
            top: 12px; right: 12px;
            width: 20px; height: 20px;
            background: #222;
            color: #444;
            font-size: 11px;
            line-height: 20px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .ad-lateral {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 999;
            background: #000;
            border: 1px solid #1a1a1a;
        }
        @media (max-width: 1200px) { .ad-lateral { display: none; } }
    </style>
</head>
<body>

<div class="ad-lateral" style="left: 0; width: 160px; height: 300px;">

      atOptions = { 'key' : '1d413aa376df2f35d57a3b697038f22f', 'format' : 'iframe', 'height' : 300, 'width' : 160, 'params' : {} };

</section>

<main class="main-container" id="scriptGrid"></main>

<div class="modal" id="infoModal" style="display:none;">
    <div class="modal-content">
        <div class="modal-icon">🔥</div>
        <h3 id="mName">Nome do Script</h3>
        <p id="mDesc">Descrição...</p>
        <button onclick="goToVerify()" class="btn-card" style="width: 100%; margin-bottom: 15px;">DESBLOQUEAR SCRIPT</button>
        <button onclick="closeModal()" style="background: transparent; color: #666; border: none; cursor: pointer;">Fechar</button>
    </div>

<div id="overlayAbusivo">

<div id="floatingWin" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#111; padding:30px; border:2px solid #00ff88; z-index:10001; border-radius:15px; width:90%; max-width:400px;">

        <span style="font-weight: 900; color: #00ff88; font-size: 18px;">✅ Script Liberado!</span>
        <span onclick="this.parentElement.parentElement.style.display='none'" style="cursor: pointer; font-size: 24px; color: #fff;">&times;</span>
    </div>
    <div class="code-box" id="finalCode" style="background:#000; padding:15px; border-radius:8px; color:#00ff88; font-family:monospace; margin-bottom:20px; word-break:break-all;"></div>
