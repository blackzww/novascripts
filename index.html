<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaScripts | Ultimate Script Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#00ff88;
    --bg:#030308;
    --card-bg:rgba(15,15,28,0.7);
    --border:rgba(255,255,255,0.08);
}

body {
    margin:0;
    font-family:Inter;
    background:var(--bg);
    color:#fff;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    padding:20px 8%;
    border-bottom:1px solid var(--border);
}

.logo span{color:var(--primary);}

/* SEARCH */
.search-section{
    padding:40px 8% 10px;
}

#searchBar{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--card-bg);
    color:white;
}

/* GRID */
.main-container{
    padding:30px 8%;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:16px;
    padding:15px;
}

.btn-card{
    margin-top:10px;
    width:100%;
    padding:10px;
    background:var(--primary);
    border:none;
    font-weight:900;
    cursor:pointer;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#111;
    padding:30px;
    border-radius:18px;
    width:90%;
    max-width:420px;
}

/* ADS AREA */
.ad-box{
    margin:20px auto;
    text-align:center;
    padding:10px;
    border:1px dashed #333;
    color:#555;
    font-size:12px;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <h1>Nova<span>Scripts</span></h1>
    </div>
    <div style="color:#00ff88;font-weight:900;">● ONLINE</div>
</header>

<!-- ADS (mantido como você queria lucro) -->
<div class="ad-box">
    ESPAÇO DE ANÚNCIO (pop / banner / AdSense aqui)
</div>

<section class="search-section">
    <input id="searchBar" placeholder="Pesquisar scripts...">
</section>

<main class="main-container" id="scriptGrid"></main>

<!-- MODAL -->
<div class="modal" id="infoModal">
    <div class="modal-content">
        <h2 id="mName"></h2>
        <p id="mDesc"></p>

        <button onclick="goToVerify()" class="btn-card">DESBLOQUEAR CÓDIGO</button>
        <button onclick="closeModal()" style="margin-top:10px;width:100%;padding:10px;">Fechar</button>
    </div>
</div>

<script src="data.js"></script>

<script>
let selectedScriptCode = "";
const data = typeof scripts !== "undefined" ? scripts : [];

/* ===== RENDER ===== */
function renderizarScripts(lista){
    const grid = document.getElementById("scriptGrid");
    grid.innerHTML = "";

    lista.forEach(s=>{
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${s.name}</h3>
            <p>${s.desc}</p>
            <button class="btn-card">VER SCRIPT</button>
        `;

        card.querySelector("button").onclick = ()=>{
            openModal(s);
        };

        grid.appendChild(card);
    });
}

/* ===== SEARCH ===== */
document.getElementById("searchBar").addEventListener("input",(e)=>{
    const t = e.target.value.toLowerCase();

    const filtered = data.filter(s =>
        (s.name||"").toLowerCase().includes(t) ||
        (s.game||"").toLowerCase().includes(t) ||
        (s.desc||"").toLowerCase().includes(t)
    );

    renderizarScripts(filtered);
});

/* ===== MODAL ===== */
function openModal(s){
    selectedScriptCode = s.code;

    document.getElementById("mName").innerText = s.name;
    document.getElementById("mDesc").innerText = s.desc;

    document.getElementById("infoModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("infoModal").style.display = "none";
}

/* ===== VERIFY + AD ===== */
function goToVerify(){
    if(!selectedScriptCode) return;

    localStorage.setItem("pendingScript", selectedScriptCode);

    // AD (mantido seu sistema de lucro)
    window.open("https://motortape.com/ga1uevxd?key=71152d36faeff43084b87ca8cf837128","_blank");

    window.location.href = "verify.html";
}

/* ===== INIT ===== */
window.onload = ()=>{
    renderizarScripts(data);
};
</script>

</body>
</html>
